<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Merry Times AI Assistant</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

.chat-page{
    background:#f5f7fb;
    height:100vh;
    display:flex;
    flex-direction:column;
}

.chat-header{
    background:#0B2E59;
    color:white;
    padding:18px;
    display:flex;
    align-items:center;
    gap:15px;
}

.chat-header img{
    width:55px;
    height:55px;
    border-radius:50%;
    background:white;
    padding:5px;
}

.chat-box{
    flex:1;
    overflow-y:auto;
    padding:25px;
}

.message{
    max-width:75%;
    padding:15px 18px;
    border-radius:18px;
    margin-bottom:18px;
    line-height:1.6;
}

.bot{
    background:white;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.user{
    background:#0B2E59;
    color:white;
    margin-left:auto;
}

.chat-input{
    display:flex;
    padding:20px;
    background:white;
    box-shadow:0 -3px 10px rgba(0,0,0,.05);
}

.chat-input input{
    flex:1;
    padding:16px;
    border:1px solid #ccc;
    border-radius:30px;
    outline:none;
    font-size:16px;
}

.chat-input button{
    margin-left:12px;
    background:#D4AF37;
    border:none;
    padding:16px 28px;
    border-radius:30px;
    cursor:pointer;
    font-weight:bold;
}

.chat-input button:hover{
    opacity:.9;
}

</style>

</head>

<body>

<div class="chat-page">

<div class="chat-header">

<a href="index.html">
    <img src="assets/logo.png" alt="School Logo">
</a>

<div>

<h2>Merry Times AI Assistant</h2>

<p>Ask me anything about the school</p>

</div>

</div>

<div class="chat-box" id="chatBox">

<div class="message bot">

👋 Welcome to Merry Times School!

I can help you with:

✅ School Fees

✅ Admission

✅ Uniforms

✅ School Requirements

✅ Calendar

✅ Announcements

How may I assist you today?

</div>

</div>

<div class="chat-input">

<input
type="text"
id="message"
placeholder="Type your question...">

<button onclick="sendMessage()">

Send

</button>

</div>

</div>

<script>

function sendMessage(){

let input=document.getElementById("message");

let chat=document.getElementById("chatBox");

if(input.value==="") return;

chat.innerHTML+=`

<div class="message user">

${input.value}

</div>

`;

chat.innerHTML+=`

<div class="message bot">

🤖 Thinking...

</div>

`;

chat.scrollTop=chat.scrollHeight;

input.value="";

}

</script>

</body>
</html>
