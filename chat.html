<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merry Times AI Assistant</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            background:#f5f7fb;
            height:100vh;
        }

        .chat-page{
            display:flex;
            flex-direction:column;
            height:100vh;
        }

        .chat-header{
            background:#0B2E59;
            color:white;
            padding:18px 25px;
            display:flex;
            align-items:center;
            gap:15px;
        }

        .chat-header a{
            text-decoration:none;
        }

        .chat-header img{
            width:60px;
            height:60px;
            border-radius:50%;
            background:white;
            padding:5px;
        }

        .chat-header p{
            color:#D4AF37;
            font-size:14px;
        }

        .chat-box{
            flex:1;
            overflow-y:auto;
            padding:25px;
        }

        .message{
            max-width:75%;
            padding:15px 18px;
            border-radius:18px;
            margin-bottom:15px;
            line-height:1.6;
            word-wrap:break-word;
        }

        .bot{
            background:white;
            box-shadow:0 5px 15px rgba(0,0,0,0.08);
        }

        .user{
            background:#0B2E59;
            color:white;
            margin-left:auto;
        }

        .chat-input{
            background:white;
            padding:20px;
            display:flex;
            gap:12px;
            box-shadow:0 -5px 15px rgba(0,0,0,0.05);
        }

        .chat-input input{
            flex:1;
            padding:16px;
            border:1px solid #ccc;
            border-radius:30px;
            outline:none;
            font-size:16px;
        }

        .chat-input button{
            background:#D4AF37;
            color:#0B2E59;
            border:none;
            padding:16px 30px;
            border-radius:30px;
            cursor:pointer;
            font-weight:bold;
        }

        .chat-input button:hover{
            opacity:0.9;
        }

        @media(max-width:768px){

            .message{
                max-width:90%;
            }

            .chat-input{
                flex-direction:column;
            }

            .chat-input button{
                width:100%;
            }
        }
    </style>
</head>

<body>

<div class="chat-page">

    <div class="chat-header">

        <a href="index.html">
            <img src="assets/logo.png" alt="Merry Times School Logo">
        </a>

        <div>
            <h2>Merry Times AI Assistant</h2>
            <p>Ask me anything about the school</p>
        </div>

    </div>

    <div class="chat-box" id="chatBox">

        <div class="message bot">
            👋 Welcome to Merry Times School!

            <br><br>

            I can help you with:

            <br>✅ School Fees
            <br>✅ Admissions
            <br>✅ Uniform Requirements
            <br>✅ School Calendar
            <br>✅ Announcements
            <br>✅ General School Information

            <br><br>

            How may I assist you today?
        </div>

    </div>

    <div class="chat-input">

        <input
            type="text"
            id="message"
            placeholder="Type your question..."
            onkeydown="if(event.key==='Enter') sendMessage()">

        <button onclick="sendMessage()">
    Send
</button>
    </div>

</div>

<script>

<script>

async function sendMessage() {

    let input = document.getElementById("message");
    let chat = document.getElementById("chatBox");

    let message = input.value.trim();

    if (message === "") return;

    // Show user's message
    chat.innerHTML += `
        <div class="message user">
            ${message}
        </div>
    `;

    // Clear input
    input.value = "";

    // Show thinking message
    chat.innerHTML += `
        <div class="message bot" id="thinking">
            🤖 Thinking...
        </div>
    `;

    chat.scrollTop = chat.scrollHeight;

    try {

        console.log("Sending to Make:", message);

        const response = await fetch(
            "https://hook.eu1.make.com/uyaijksi7692dmtyl6mmcb33oyht6hzp",
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    message: message
                })
            }
        );

        console.log("Response:", response);

        const reply = await response.text();

        document.getElementById("thinking").innerHTML =
            "🤖 " + reply;

    } catch (error) {

        console.error(error);

        document.getElementById("thinking").innerHTML =
            "❌ Unable to contact the assistant.";

    }

    chat.scrollTop = chat.scrollHeight;
}

</script>

</script>

</body>
</html>
